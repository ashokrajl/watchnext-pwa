<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>WatchNext</title>
  <link rel="manifest" href="/manifest.webmanifest"/>
  <link rel="stylesheet" href="/styles.css"/>
  <meta name="theme-color" content="#0f172a"/>
</head>
<body>
  <header>
    <h1>🎬 WatchNext</h1>
    <div class="filters">
      <label>Year from <input id="yearFrom" type="number" min="1900" max="2100" value="2023"/></label>
      <label>to <input id="yearTo" type="number" min="1900" max="2100" value="2025"/></label>
      <label>Rating from <input id="ratingMin" type="number" min="0" max="10" step="0.1" value="6"/></label>
      <label>to <input id="ratingMax" type="number" min="0" max="10" step="0.1" value="10"/></label>
      <select id="genres" multiple size="4" title="Genres"></select>
      <button id="apply">Apply</button>
    </div>
  </header>

  <main id="grid" class="grid"></main>
  <div id="loading" class="loading hidden">Loading…</div>
  <div id="error" class="error hidden"></div>
  <footer>
    <button id="loadMore">Load more</button>
    <button id="clearSeen" class="ghost">Clear Seen</button>
  </footer>

  <script src="/main.js" type="module"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
